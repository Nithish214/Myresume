version: "3.9"

services:
    backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: resume-backend
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:5000:5000"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: resume-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: resume-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend